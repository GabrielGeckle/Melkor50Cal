<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Geckle - 3D Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }
        h1 { font-size: 3rem; margin: 40px 0 10px; }
        p { font-size: 1.3rem; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1>Gabriel Geckle</h1>
    <p>3D Modeling Portfolio</p>

    <h2>My Work</h2>
    <div class="gallery">
        <img src="https://via.placeholder.com/600x400/333/fff?text=Model+1" alt="3D Model 1">
        <img src="https://via.placeholder.com/600x400/333/fff?text=Model+2" alt="3D Model 2">
    </div>

    <h2>Interactive 3D Models</h2>
    <p>I'll add Sketchfab embeds here soon</p>
</body>
</html>
